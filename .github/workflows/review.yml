
name: Review

on:
  workflow_run:
    workflows: ["Analysis"] # 必须与第一个 Action 的 name 字段完全一致
    types:
      - completed

  # 保留手动触发按钮，方便调试
  workflow_dispatch:

jobs:
  check-home-access:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: 1. 下载最新qlib_bin.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 下载名为 qlib_bin.tar.gz 的附件到当前目录
          gh release download --repo chenditc/investment_data --pattern "qlib_bin.tar.gz"

          # 2. 解压文件
          echo ">>> 正在解压数据..."
          mkdir -p ~/.qlib/qlib_data/cn_data

          tar -zxf qlib_bin.tar.gz -C ~/.qlib/qlib_data/cn_data --strip-components=1
          
          # 3. 验证解压后的内容
          tail -n1   ~/.qlib/qlib_data/cn_data/calendars/day.txt

      - name: 2. Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main         # 显式指定拉取 main 分支
          fetch-depth: 1    # 只拉取最新一次提交以节省时间

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 建议使用 '3.12' 匹配最新稳定补丁，若强行指定不存在的版本会报错

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ 警告: 未找到 requirements.txt，跳过安装。"
          fi

      - name: 从 qlib_score 拉取数据
        run: |
          git fetch origin qlib_score
          git checkout origin/qlib_score -- qlib_score_csv || mkdir -p qlib_score_csv
          git restore --staged qlib_score_csv 2>/dev/null || true

      - name: 5. Review
        run: |
            echo ">>> 运行分析脚本..."
            cd ./roll && python ./roll.py model review

            # 将分析结果文件复制到指定目录，并提交
            mkdir -p ../page/docs/pages/mahoupao
            cp /tmp/review_result.md ../page/docs/pages/mahoupao/review_result.md

            # 拉取最新代码防止冲突
            git pull origin main || true

            # 配置 Git 用户身份
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            # 添加并提交变更，避免空提交出错
            git add -f ../page/docs/pages/mahoupao/review_result.md
            if git diff --cached --quiet; then
              echo "review_result.md 没有变化，跳过提交。"
            else
              git commit -m "自动更新马后炮分析结果: $(date +'%Y-%m-%d %H:%M:%S')"
              git push origin main
            fi

      - name: 运行分析脚本并同时提交 backtest_csv 和 review_csv 到 qlib_score 分支
        run: |
          echo ">>> 运行分析脚本..."
          cd ./roll && python ./roll.py model backtest
          cd ..

          # 回到仓库根目录
          cd "$(git rev-parse --show-toplevel)"

          # backtest 实际写入仓库根目录 backtest_csv/（见 roll/model_review.py）。
          # 在 main 上这些文件多为未跟踪；qlib_score 若跟踪同名路径，直接 checkout 会报
          # "untracked working tree files would be overwritten"。先备份再删除目录再切换分支。
          CI_BT_DIR="${RUNNER_TEMP:-/tmp}/ci_backtest_csv"
          mkdir -p "$CI_BT_DIR"
          if [ -d backtest_csv ]; then
            cp backtest_csv/*.csv "$CI_BT_DIR/" 2>/dev/null || true
          fi
          rm -rf backtest_csv

          # 拉取 qlib_score 分支最新内容
          git fetch origin qlib_score

          # 检出并切换到本地 qlib_score 分支，若不存在则新建追踪远程分支
          if git show-ref --verify --quiet refs/heads/qlib_score; then
            git checkout qlib_score
          else
            git checkout -b qlib_score origin/qlib_score
          fi

          # 同步远端
          git pull origin qlib_score || true

          # 确保 backtest_csv 和 review_csv 目录存在
          mkdir -p backtest_csv
          mkdir -p review_csv

          # 恢复本次回测生成的 CSV（主路径）；兼容 roll/backtest_csv
          cp "$CI_BT_DIR"/*.csv backtest_csv/ 2>/dev/null || true
          if [ -d "roll/backtest_csv" ]; then
            cp roll/backtest_csv/*.csv backtest_csv/ 2>/dev/null || true
          fi
          # review_csv 不做拷贝，假定本仓库 review_csv 目录已有需要的 csv

          # git add 两个目录下的所有 csv 文件
          git add -f backtest_csv/*.csv
          git add -f review_csv/*.csv

          # 配置 Git 用户身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "backtest_csv 和 review_csv 下 csv 没有变化，跳过提交。"
          else
            git commit -m "自动同步 backtest_csv 和 review_csv 到 qlib_score 分支: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin qlib_score
          fi